<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rushda Raheem | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #171c28; /* Dark background from your image */
            color: #ffffff;
            line-height: 1.6;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 80px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 80vh;
        }

        .hero-text {
            flex: 1;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }

        .description {
            font-size: 1.25rem;
            color: #8892b0;
            max-width: 600px;
        }

        .highlight {
            color: #a672f5; /* Purple accent */
            font-weight: bold;
        }

        .social-links {
            margin: 30px 0;
            display: flex;
            gap: 15px;
        }

        .social-links a {
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background-color: #2d343e;
            transition: 0.3s;
        }

        /* Specific colors for icons */
        .social-links a.github:hover { background-color: #333; }
        .social-links a.linkedin { background-color: #0077b5; }
        .social-links a.email { background-color: #ea4335; }

        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .btn-primary {
            background-color: #55198b;
            color: white;
            border: 2px solid #55198b;
        }

        .btn-secondary {
            border: 2px solid #55198b;
            color: white;
        }

        .btn:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        .hero-image {
            flex: 1;
            text-align: right;
        }

        .hero-image img {
            max-width: 100%;
            height: auto;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                text-align: center;
                padding-top: 40px;
            }
            .hero-image {
                margin-top: 40px;
            }
            .social-links, .buttons {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="hero-text">
            <h1>Hi all, I'm Rushda 👋</h1>
            <p class="description">
                A passionate <span class="highlight">Full Stack Software Developer</span> 🚀 having experience building Web applications with 
                <span class="highlight">JavaScript / Reactjs / PHP / Python</span> [cite: 5, 10, 11, 12] and other cool tools like 
                <strong>Vite and Lovable AI</strong>[cite: 15].
            </p>

            <div class="social-links">
                <a href="https://github.com/rushdaraheem" class="github" title="GitHub"><i class="fab fa-github"></i></a>
                <a href="https://linkedin.com/in/rushdaraheem" class="linkedin" title="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
                <a href="mailto:rushdaraheem2005@gmail.com" class="email" title="Email"><i class="fas fa-envelope"></i></a>
            </div>

            <div class="buttons">
                <a href="mailto:rushdaraheem2005@gmail.com" class="btn btn-primary">CONTACT ME</a>
              <a href="Rushda_Raheem_ATS_CV(2).docx" class="btn btn-secondary">DOWNLOAD MY RESUME</a>
            </div>
        </div>

        <div class="hero-image">
         <img src="https://cdni.iconscout.com/illustration/premium/thumb/male-programmer-working-on-laptop-5695601-4743373.png" alt="Developer Illustration">
        </div>
    </div>

</body>
</html>
